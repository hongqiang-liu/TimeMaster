<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #4b5563; }
      .boxTitle { font: 700 24px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #111827; }
      .boxText { font: 500 19px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #111827; }
      .small { font: 500 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="#f9fafb" />
  <text x="60" y="64" class="title">TimeMaster 鼠标交互规则</text>
  <text x="60" y="98" class="subtitle">MainWindow 与托盘共用同一套右键菜单</text>

  <rect x="60" y="140" rx="18" ry="18" width="510" height="330" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="90" y="188" class="boxTitle">启用鼠标穿透</text>
  <text x="90" y="235" class="boxText">1) 平时鼠标点击会穿透浮窗</text>
  <text x="90" y="270" class="boxText">2) 按住 LeftCtrl 进入可交互状态</text>
  <text x="90" y="305" class="boxText">3) 可左键拖动 + 右键菜单</text>
  <text x="90" y="340" class="boxText">4) 松开 LeftCtrl 恢复穿透</text>
  <text x="90" y="390" class="small">适合保持桌面点击流畅，不干扰其他窗口</text>

  <rect x="630" y="140" rx="18" ry="18" width="510" height="330" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="660" y="188" class="boxTitle">停用鼠标穿透</text>
  <text x="660" y="235" class="boxText">1) 浮窗可直接接收鼠标操作</text>
  <text x="660" y="270" class="boxText">2) 无需按 LeftCtrl</text>
  <text x="660" y="305" class="boxText">3) 可直接左键拖动 + 右键菜单</text>
  <text x="660" y="340" class="boxText">4) 交互更直观，适合频繁调整位置</text>
  <text x="660" y="390" class="small">浮窗悬停时会播放缩放/阴影/透明度动画</text>

  <line x1="570" y1="305" x2="630" y2="305" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)" />

  <text x="60" y="520" class="small">提示：右键菜单项与系统托盘完全一致（显示时钟、设置、倒计时窗口、重启、退出）</text>
</svg>
